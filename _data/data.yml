projects:
    - title: Privacy-preserving Deep Learning Design Using Fully Homomorphic Encryption
      time: Sep. 2020 - Present
      company: Seoul National University
      details: |
        - Bootstrapping of the CKKS scheme: Developed an algorithm to find an optimal approximate polynomial for bootstrapping of the CKKS scheme in the stochastic aspect.
        - Reducing Errors in the CKKS scheme: Designed a new method to adjust the order of operations for applications using the CKKS scheme that minimizes the error.
        - Privacy-preserving machine learning: Designed a new protocol using fully homomorphic encryption without bootstrapping in two-party computation.

